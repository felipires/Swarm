name: Publish NuGet Packages

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Swarm.Node.Sdk
        run: dotnet build Swarm.Node.Sdk/Swarm.Node.Sdk.csproj --configuration Release --no-restore

      - name: Pack Swarm.Node.Sdk
        run: dotnet pack Swarm.Node.Sdk/Swarm.Node.Sdk.csproj --configuration Release --no-build -p:PackageVersion=${{ steps.version.outputs.version }} --output nuget-packages

      - name: Publish to NuGet
        run: dotnet nuget push nuget-packages/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
        if: secrets.NUGET_API_KEY != ''

      - name: Publish to GitHub Packages
        run: dotnet nuget push nuget-packages/*.nupkg --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json --skip-duplicate
        if: secrets.GITHUB_TOKEN != ''
