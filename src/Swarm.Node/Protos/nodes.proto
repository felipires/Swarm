syntax = "proto3";

package swarm.cluster.nodes;

option csharp_namespace = "Swarm.Cluster.Services";

service NodesService {
  rpc RegisterNode (RegisterNodeRequest) returns (RegisterNodeResponse);
  rpc RecordHeartbeat (RecordHeartbeatRequest) returns (RecordHeartbeatResponse);
}

message RegisterNodeRequest {
  string api_key = 1;
  string node_id = 2;
  // Node-local static tags (D6): SWARM_TAG_* env vars + Swarm:Tags appsettings.
  // Replaces the legacy environment_tags field which leaked the full IConfiguration.
  map<string, string> static_tags = 3;
  // Handlers this Node is willing to execute (P0-3b). Reported wholesale on
  // every registration — the Cluster replaces this Node's capability rows.
  repeated HandlerCapability handlers = 4;
  // P5-1: static hardware capacity — sent once at registration, immutable per
  // process lifetime. Persisted on the Node row for durable display.
  NodeCapacity capacity = 5;
}

message HandlerCapability {
  // TaskType identifier including version per D3 (e.g. "http@1").
  string task_type = 1;
  // JSON Schema (draft 2020-12) describing the handler's ConfigJson shape.
  string json_schema = 2;
  // Env keys the handler requires in the Node's env store (resolved by P1-5a).
  repeated string required_env_keys = 3;
  // Runtime param keys the handler requires at dispatch time.
  repeated string required_params = 4;
}

message RemoteParameters {
  string queue_host = 1;
  string queue_port = 2;
  string queue_user_name = 3;
  string queue_password = 4;
}

message RegisterNodeResponse {
  string node_id = 1;
  string node_name = 2;
  RemoteParameters queue_parameters = 3;
}

message RecordHeartbeatRequest {
  string node_id = 1;
  string api_key = 2;
  bool is_online = 3;
  // P1-5a: IDs of env ops the Node has applied since the last heartbeat.
  // The Cluster deletes these so they're not redelivered.
  repeated string acked_env_op_ids = 4;
  // P5-1: live resource gauges attached to every heartbeat. Best-effort —
  // absent field means the Node does not (yet) collect metrics.
  NodeMetrics metrics = 5;
}

message RecordHeartbeatResponse {
  bool success = 1;
  string message = 2;
  // Cluster-managed overlay tags (D6) pushed to the Node on every heartbeat.
  // Node merges with its static tags; static wins on key conflict.
  map<string, string> overlay_tags = 3;
  // P1-5a: pending task-env mutations the Node should apply to its local
  // encrypted env store. Each op carries an ID the Node echoes back in
  // its next heartbeat's acked_env_op_ids to confirm.
  repeated EnvOp pending_env_ops = 4;
  // P0-3a / D6: shared "tasks.tagged.<hash>" queue names this Node should
  // be subscribed to. Computed by the Cluster from known TaggedRoutes
  // whose selector is a subset of the Node's effective tags. The Node
  // diffs this set against its current subscriptions and subscribes /
  // cancels accordingly on each heartbeat.
  repeated string tagged_subscriptions = 5;
}

message EnvOp {
  string id = 1;
  EnvOpKind kind = 2;
  string key = 3;
  // Value present for Set; ignored for DeleteKey.
  string value = 4;
}

enum EnvOpKind {
  SET = 0;
  DELETE_KEY = 1;
}

// P5-1 — static hardware capacity reported once at registration.
message NodeCapacity {
  int32 cpu_cores = 1;
  int64 total_memory_bytes = 2;
}

// P5-1 — live resource gauges reported on every heartbeat.
message NodeMetrics {
  double cpu_percent = 1;
  int64 memory_used_bytes = 2;
  int64 memory_available_bytes = 3;
  int32 in_flight_tasks = 4;
  int64 uptime_seconds = 5;
  HealthStatus health = 6;
}

enum HealthStatus {
  HEALTHY = 0;
  DEGRADED = 1;
  UNHEALTHY = 2;
}
