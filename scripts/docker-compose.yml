version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-swarm}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - swarm-network

  cluster:
    build:
      context: ./../
      dockerfile: src/Swarm.Cluster/Dockerfile
    environment:
      # DB name aligns with the postgres service's POSTGRES_DB (default: swarm).
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-swarm};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Redis__Connection: "redis:6379"
      RabbitMQ__Hostname: "rabbitmq"
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:5000"
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - swarm-network
    volumes:
      - ../src/Swarm.Cluster/logs:/app/logs

  node:
    build:
      context: ./../
      dockerfile: src/Swarm.Node/Dockerfile
    environment:
      ClusterUrl: "http://cluster:5000"
      RabbitMQ__Hostname: "rabbitmq"
      # Node identity to the Cluster. Committed appsettings ships this blank;
      # supply a real value here (or via .env) per deployment.
      ApiKey: ${NODE_API_KEY:-node-dev-key}
    depends_on:
      rabbitmq:
        condition: service_healthy
      cluster:
        condition: service_started
    networks:
      - swarm-network
    volumes:
      - ../src/Swarm.Node/logs:/app/logs
    deploy:
      replicas: 1 # Start 1 node instance

  frontend:
    build:
      context: ./../src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: "http://cluster:5000/api"
    depends_on:
      - cluster
    networks:
      - swarm-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  swarm-network:
    driver: bridge
